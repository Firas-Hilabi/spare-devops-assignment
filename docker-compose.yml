# Full local stack: API + PostgreSQL on a private network.
# `version:` is intentionally omitted (obsolete in Compose v2).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-notifications}
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-app}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # Gate the API on real DB readiness, not just "container started".
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-app} -d ${DB_NAME:-notifications}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks: [appnet]
    restart: unless-stopped

  api:
    build:
      context: .
    image: notifications-api:local
    env_file: .env
    environment:
      # Override so the API reaches Postgres by service name on the network.
      DB_HOST: db
    ports:
      # HOST_PORT lets you avoid local conflicts; container always serves 8080.
      - "${HOST_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy   # correct startup ordering
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks: [appnet]
    restart: unless-stopped

volumes:
  pgdata:

networks:
  appnet:
    driver: bridge
