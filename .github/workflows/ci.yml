name: CI/CD

# PRs -> build + smoke test the full stack.
# Push to main -> the above, then publish the image to GHCR.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # owner/repo (lowercased by Docker)

jobs:
  build-and-test:
    name: Build & smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build once, load into the local daemon, and cache layers across runs.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: notifications-api:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Scan for known CVEs. Fails the build on fixable CRITICAL issues only,
      # so noise from unfixed base-image findings doesn't block PRs.
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: notifications-api:local
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - name: Start the stack
        run: |
          cp .env.example .env
          docker compose up -d      # reuses the image built above (no rebuild)

      - name: Smoke test
        run: |
          chmod +x scripts/ops.sh
          ./scripts/ops.sh smoke

      # Always surface logs when something failed, for fast debugging.
      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  publish:
    name: Publish image to GHCR
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided, no committed secret

      # Meaningful tags: 'latest' + the commit SHA for traceability.
      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
